<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 0;
      background-color: #121212;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      overflow: hidden;
    }
    .container {
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-svg {
      width: 32px;
      height: 32px;
      fill: #2563eb;
    }
    h2 { 
      margin: 0; 
      font-size: 18px; 
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-start { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
    .btn-start:hover:not(:disabled) { background-color: #1d4ed8; transform: translateY(-1px); }
    
    .btn-stop { background-color: #ef4444; color: white; display: none; }
    .btn-stop:hover { background-color: #dc2626; }

    .btn-share {
      background-color: #1e1e1e;
      color: #a3a3a3;
      border: 1px solid #333;
      margin-top: 12px;
    }
    .btn-share:hover {
      background-color: #262626;
      color: #ffffff;
    }
    
    .select-wrapper { margin-bottom: 20px; }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #737373;
    }
    
    select {
      width: 100%;
      padding: 12px;
      background-color: #1e1e1e;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #737373;
      height: 18px;
    }

    .footer {
      background-color: #1a1a1a;
      padding: 12px;
      text-align: center;
      border-top: 1px solid #262626;
      font-size: 11px;
    }
    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .version {
      color: #525252;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo-svg" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
      </svg>
      <h2>Recorder Pro</h2>
    </div>
    
    <div class="select-wrapper" id="settings">
      <label for="quality">Video Quality</label>
      <select id="quality">
        <option value="1080p60">1080p @ 60fps (High Bitrate)</option>
        <option value="720p30">720p @ 30fps (Standard)</option>
      </select>
    </div>

    <button id="startBtn" class="btn btn-start">Start Recording</button>
    <button id="stopBtn" class="btn btn-stop">Stop Recording</button>

    <button id="shareBtn" class="btn btn-share">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/>
      </svg>
      Share Extension
    </button>

    <div id="status">Ready to capture</div>
  </div>

  <div class="footer">
    <div>Created by <a href="https://stadiastudios.github.io/stadia/" target="_blank">StadiaStudios</a></div>
    <div class="version">v1.0.0</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
